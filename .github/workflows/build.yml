name: Build Gestor_biblioteca

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: Gestor_biblioteca-x86_64.AppImage
            final-suffix: Linux-x86_64.AppImage
            build-script: scripts/build-linux.sh
          - os: windows-latest
            artifact-name: Gestor_biblioteca.exe
            final-suffix: Windows-x86_64.exe
            build-script: scripts/build-windows.ps1
          - os: macos-14
            artifact-name: Gestor_biblioteca-x86_64.dmg
            final-suffix: MacOS_Intel_Legacy.dmg
            final-zip-suffix: MacOS_Intel_Legacy.zip
            arch: x86_64
            build-script: scripts/build-macos.sh
          - os: macos-14
            artifact-name: Gestor_biblioteca-arm64.dmg
            final-suffix: MacOS_arm64.dmg
            final-zip-suffix: MacOS_arm64.zip
            arch: arm64
            build-script: scripts/build-macos.sh

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r tools/Gestor_biblioteca/requirements.txt pyinstaller

      - name: Compile Pillow universal2 (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHFLAGS="-arch arm64 -arch x86_64" pip install \
            --no-binary=Pillow --force-reinstall Pillow

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils libfuse2

      - name: Run build script (Unix)
        if: runner.os != 'Windows'
        env:
          MACOS_ARCH: ${{ matrix.arch }}
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: bash ${{ matrix.build-script }}

      - name: Run build script (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-windows.ps1

      - name: Rename artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          tag="${{ github.ref_name }}"
          mv "dist/${{ matrix.artifact-name }}" \
             "dist/Gestor_biblioteca-${tag}-${{ matrix.final-suffix }}"

      - name: Rename artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          tag="${{ github.ref_name }}"
          mv "dist/${{ matrix.artifact-name }}" \
             "dist/Gestor_biblioteca-${tag}-${{ matrix.final-suffix }}"
          mv "dist/Gestor_biblioteca-${{ matrix.arch }}.zip" \
             "dist/Gestor_biblioteca-${tag}-${{ matrix.final-zip-suffix }}"

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Move-Item "dist/Gestor_biblioteca.exe" "dist/Gestor_biblioteca-${tag}-Windows-x86_64.exe"

      - name: Upload Artifacts (Linux / Windows)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: Gestor_biblioteca-${{ github.ref_name }}-${{ matrix.final-suffix }}
          path: dist/Gestor_biblioteca-${{ github.ref_name }}-${{ matrix.final-suffix }}

      - name: Upload Artifacts (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v6
        with:
          name: Gestor_biblioteca-${{ github.ref_name }}-${{ matrix.final-suffix }}
          path: |
            dist/Gestor_biblioteca-${{ github.ref_name }}-${{ matrix.final-suffix }}
            dist/Gestor_biblioteca-${{ github.ref_name }}-${{ matrix.final-zip-suffix }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Gestor_biblioteca-*
          body_path: release-notes.md
